services:
  db:
    image: postgres:16-alpine
    container_name: produtos_db
    environment:
      POSTGRES_DB: produtos_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d produtos_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  db_test:
    image: postgres:16-alpine
    container_name: produtos_db_test
    environment:
      POSTGRES_DB: produtos_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d produtos_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build: .
    container_name: produtos_api
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/produtos_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
